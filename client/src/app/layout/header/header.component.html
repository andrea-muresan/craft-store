<header class="relative shadow-md px-6 md:px-12 py-6 flex items-center justify-between border-b"> 
    <div>
        <h1 id="store-name" class="text-2xl md:text-3xl font-bold" style="font-family: 'Playfair Display', serif; color: #5C3317;">{{title}}</h1>
        <p class="text-xs mt-0.5 tracking-widest uppercase" style="color: #A0725C;">{{tagline}}</p>
    </div>
    <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a>Home</a>
        <a>Shop</a>
        <a>Contact</a>
        <a matBadge="5" matBadgeSize="medium" class="custom-badge">
            <svg lucideShoppingBag></svg>
        </a>
        <a class="flex items-center gap-2">
            <svg lucideUser></svg>
            <span class="text-xs">Account</span>
        </a>
    </nav>
    <button (click)="toggleMenu()" class="md:hidden"><svg lucideMenu></svg></button>

    @if (isMenuOpen) {
        <div class="vertical-menu absolute top-full left-0 right-0 border-b z-40 flex flex-col bg-neutral-50 text-sm font-medium shadow-lg md:hidden">
            <a><svg lucideHouse></svg>Home</a>
            <a><svg lucideStore></svg>Shop</a>
            <a><svg lucideContact></svg>Contact</a>
            <a><svg lucideShoppingBag></svg>Cart</a>
            <a><svg lucideUser></svg>Account</a>
        </div>
    }
</header>
