@if (product) {
    <div class="product-card rounded-2xl overflow-hidden flex flex-col h-full">
        <div class="h-56 w-full overflow-hidden flex-shrink-0">
            <img id="imgProd1" 
                [src]="product.pictureUrl || '/images/no-image.png'"
                (error)="$event.target.src = '/images/no-image.png'" 
                class="h-full w-full object-cover"
                [alt]="product.name" />
        </div>
        <div class="p-5 flex flex-col flex-grow">
            <span class="text-xs uppercase tracking-wider font-medium">{{product.type}}</span>
            <h3 class="text-lg mt-1.5">{{product.name}}</h3>
            <!-- <p class="text-sm mt-1">short desc???</p> -->
            
            <div class="flex items-center justify-between mt-auto pt-4">
                <h3 class="font-semibold text-base">{{product.price | currency}}</h3>
                <button class="px-4 py-2 rounded-full text-xs font-medium text-white">Add to Cart</button>
            </div>
        </div>
     </div>
}
